name: Lighthouse & Accessibility

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Lighthouse CI
        run: npx lhci autorun || echo "::warning::Lighthouse assertions failed"

  axe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Playwright + axe accessibility
        run: npx playwright test tests/e2e/accessibility.spec.ts --project=chromium
